name: Repair Caneta Football product

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/repair-product.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-caneta-product
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and validate product archive
        shell: bash
        run: |
          set -euo pipefail
          cat package/part-* | tr -d '\r\n' > /tmp/caneta-product.b64
          base64 --decode /tmp/caneta-product.b64 > /tmp/caneta-product.zip
          echo "Reconstructed archive:"
          sha256sum /tmp/caneta-product.zip
          unzip -t /tmp/caneta-product.zip

      - name: Replace loader with direct application files
        shell: bash
        run: |
          set -euo pipefail
          unzip -o /tmp/caneta-product.zip -d .
          rm -rf package
          rm -f .github/workflows/repair-product.yml

      - name: Validate direct application
        shell: bash
        run: |
          set -euo pipefail
          node --check app.js
          python -m json.tool data/trip.json >/dev/null
          python -m json.tool data/journeys/CFT-DEMO-BA-001.json >/dev/null
          test -s styles.css
          test -s index.html

      - name: Commit repaired product
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Replace package loader with direct application files"
          git push origin HEAD:main
