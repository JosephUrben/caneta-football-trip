name: Bootstrap Caneta Football product

on:
  push:
    branches: ["main"]
    paths:
      - "bootstrap.ready"

permissions:
  contents: write

concurrency:
  group: bootstrap-product
  cancel-in-progress: false

jobs:
  unpack-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reassemble and verify product package
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/part-* > /tmp/caneta-product.b64
          base64 --decode /tmp/caneta-product.b64 > /tmp/caneta-product.zip
          echo "f3b87537e1315a4a22b1ff6bcdf23681b31ce1d1730c408f7b30c31c7962bd67  /tmp/caneta-product.zip" | sha256sum --check --strict

      - name: Unpack finished product
        shell: bash
        run: |
          set -euo pipefail
          unzip -o /tmp/caneta-product.zip -d .
          rm -rf bootstrap bootstrap.ready .github/workflows/bootstrap-product.yml

      - name: Commit finished application
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish Caneta Football trip companion"
          git push origin HEAD:main
